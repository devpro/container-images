apiVersion: v1
kind: Service
metadata:
  name: ctf-app
  namespace: ctf
  labels:
    app.kubernetes.io/name: ctf-app
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ctf-app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
