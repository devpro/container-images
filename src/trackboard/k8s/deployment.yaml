apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctf-app
  namespace: ctf
  labels:
    app.kubernetes.io/name: ctf-app
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: frontend
  annotations:
    # Trigger a rolling restart when this annotation is updated (e.g. by CI)
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ctf-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero-downtime deployments
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ctf-app
        app.kubernetes.io/component: frontend
      annotations:
        # Force pod restart when ConfigMap changes (checksum injected by CI)
        checksum/config: "placeholder-replaced-by-ci"
    spec:
      # ── Scheduling ─────────────────────────────────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ctf-app

      # ── Security (pod level) ───────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 101       # nginx user UID in nginx:alpine
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault

      automountServiceAccountToken: false

      # ── Containers ────────────────────────────────────────────────────────
      containers:
        - name: ctf-app
          image: ghcr.io/YOUR_ORG/devopsday-ctf:latest   # replaced by CI
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # ── Security (container level) ──────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # ── Resources ──────────────────────────────────────────────────
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          # ── Probes ─────────────────────────────────────────────────────
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 10
            periodSeconds: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3

          # ── Writable tmp dirs needed by nginx ──────────────────────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run

      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}

      # ── Graceful shutdown ─────────────────────────────────────────────
      terminationGracePeriodSeconds: 30
