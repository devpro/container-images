apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ctf-app
  namespace: ctf
  labels:
    app.kubernetes.io/name: ctf-app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ctf-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic only from the ingress controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx  # adjust if needed
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound HTTPS (for Google Fonts CDN)
    - ports:
        - protocol: TCP
          port: 443
