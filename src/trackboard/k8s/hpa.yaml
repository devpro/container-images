apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ctf-app
  namespace: ctf
  labels:
    app.kubernetes.io/name: ctf-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ctf-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
